<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIDx OTA Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e0e0e0; min-height: 100vh; }

    /* Login */
    .login-container {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1117 100%);
    }
    .login-card {
      background: #161b2e; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
      padding: 48px; width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-card h1 {
      font-size: 28px; font-weight: 800; margin-bottom: 4px;
      background: linear-gradient(135deg, #4ade80, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-card p { color: #62b3e0; font-size: 13px; margin-bottom: 32px; }
    .login-card label { display: block; font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .login-card input {
      width: 100%; padding: 12px 16px; background: #0f1420; border: 1px solid #2d3548;
      border-radius: 10px; color: #e0e0e0; font-size: 14px; margin-bottom: 20px; outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: #60a5fa; }
    .btn-login {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none; border-radius: 10px; color: #000; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .login-error { color: #f87171; font-size: 13px; margin-bottom: 16px; text-align: center; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 240px; background: #111827; border-right: 1px solid rgba(255,255,255,0.06);
      padding: 20px 0; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-logo h2 {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, #4ade80, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-logo span { font-size: 10px; color: #62b3e0; text-transform: uppercase; letter-spacing: 1.5px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin: 2px 0;
      border-radius: 10px; cursor: pointer; font-size: 13px; color: #9ca3af;
      transition: all 0.2s; text-decoration: none;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: #e0e0e0; }
    .sidebar-item.active { background: rgba(96,165,250,0.1); color: #60a5fa; font-weight: 600; }
    .sidebar-item svg { width: 20px; height: 20px; }
    .sidebar-footer {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; color: #4a9fd4;
    }
    .sidebar-footer .logout { color: #f87171; cursor: pointer; font-size: 12px; }
    .sidebar-footer .logout:hover { text-decoration: underline; }

    /* Main content */
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .page-title { font-size: 28px; font-weight: 700; color: #f3f4f6; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: #4ade80; margin-bottom: 24px; }
    .divider { height: 1px; background: #4ade80; opacity: 0.3; margin-bottom: 28px; }

    /* Cards */
    .card {
      background: #161b2e; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }
    .card-title { font-size: 16px; font-weight: 600; color: #f3f4f6; margin-bottom: 16px; }

    /* Info blocks */
    .info-row { display: flex; gap: 32px; flex-wrap: wrap; }
    .info-block label { display: block; font-size: 11px; color: #62b3e0; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-block .value { font-size: 18px; font-weight: 700; color: #4ade80; }
    .info-block .value.blue { color: #60a5fa; }
    .hash-text { font-family: monospace; font-size: 12px; color: #9ca3af; word-break: break-all; max-width: 500px; }
    .copy-btn {
      background: none; border: none; color: #62b3e0; cursor: pointer; font-size: 12px;
      padding: 2px 6px; border-radius: 4px;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.05); color: #e0e0e0; }

    /* Form elements */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; color: #62b3e0; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      padding: 10px 14px; background: #0f1420; border: 1px solid #2d3548;
      border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none;
    }
    .form-group input:focus { border-color: #60a5fa; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex;
      align-items: center; gap: 8px;
    }
    .btn-primary { background: #22c55e; color: #000; }
    .btn-primary:hover { background: #4ade80; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-blue:hover { background: #60a5fa; }
    .btn-red { background: #dc2626; color: #fff; }
    .btn-red:hover { background: #ef4444; }
    .btn-outline {
      background: transparent; color: #60a5fa; border: 1px solid #3b82f6;
    }
    .btn-outline:hover { background: rgba(59,130,246,0.1); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .file-btn { position: relative; overflow: hidden; }
    .file-btn input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }

    /* Alert */
    .alert {
      padding: 12px 16px; border-radius: 8px; margin-top: 16px; font-size: 13px;
    }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; color: #62b3e0; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #d1d5db; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .chip {
      display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px;
      font-weight: 600; background: rgba(34,197,94,0.15); color: #4ade80;
    }
    .chip.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .chip.orange { background: rgba(251,146,60,0.15); color: #fb923c; }
    .chip.red { background: rgba(239,68,68,0.15); color: #f87171; }
    .chip.gray { background: rgba(156,163,175,0.15); color: #9ca3af; }
    .mono { font-family: monospace; font-size: 12px; color: #9ca3af; }
    .sds-meter-row:hover { background: rgba(255,255,255,0.03); }
    .description { font-size: 12px; color: #9ca3af; margin-bottom: 12px; }

    /* Progress bar */
    .progress-container {
      width: 100%; background: #0f1420; border-radius: 6px; height: 8px; overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar {
      height: 100%; border-radius: 6px; transition: width 0.3s ease;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
    }
    .progress-bar.complete {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }
    .progress-bar.error {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }
    .progress-text {
      font-size: 11px; color: #62b3e0; margin-top: 2px;
    }

    /* OTA meter card */
    .ota-meter-card {
      background: #0f1420; border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px; padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
    }
    .ota-meter-drn {
      font-family: monospace; font-size: 14px; font-weight: 600; color: #e0e0e0;
      min-width: 140px;
    }
    .ota-meter-info { flex: 1; }
    .ota-meter-status { min-width: 100px; text-align: right; }

    /* Status dot */
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
    }
    .status-dot.green { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.4); }
    .status-dot.blue { background: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.4); animation: pulse 1.5s infinite; }
    .status-dot.red { background: #f87171; }
    .status-dot.gray { background: #62b3e0; }
    .status-dot.orange { background: #fb923c; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn { background: none; border: none; color: #62b3e0; cursor: pointer; padding: 4px; border-radius: 6px; }
    .refresh-btn:hover { background: rgba(255,255,255,0.05); color: #e0e0e0; }

    .description { font-size: 13px; color: #62b3e0; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const state = {
      token: sessionStorage.getItem('ota_token'),
      user: JSON.parse(sessionStorage.getItem('ota_user') || 'null'),
      firmware: null,
      versions: [],
      meters: [],
      otaState: {},
      meterFirmwareVersions: {},
      nextion: null,
      nextionVersions: [],
      nextionOtaState: {},
    };

    let eventSource = null;

    // ─── API helpers ───
    async function api(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
      if (!(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';

      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) { logout(); throw new Error('Session expired'); }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function logout() {
      sessionStorage.removeItem('ota_token');
      sessionStorage.removeItem('ota_user');
      state.token = null;
      state.user = null;
      if (eventSource) { eventSource.close(); eventSource = null; }
      render();
    }

    // ─── SSE for real-time OTA updates ───
    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(`/api/ota/events?token=${state.token}`);

      // Auth via query param won't work with our middleware, so use a polling fallback
      // Actually, the SSE endpoint uses auth middleware which reads Authorization header.
      // EventSource doesn't support headers, so we'll use fetch-based SSE or polling.
      eventSource.close();
      eventSource = null;
      startPolling();
    }

    let pollInterval = null;
    function startPolling() {
      if (pollInterval) return;
      pollInterval = setInterval(async () => {
        try {
          const data = await api('/api/ota/status');
          let changed = false;

          // Update OTA state
          for (const drn in data.otaState) {
            const prev = state.otaState[drn];
            const curr = data.otaState[drn];
            if (!prev || prev.status !== curr.status || prev.progress !== curr.progress) {
              changed = true;
            }
            state.otaState[drn] = curr;
          }

          // Update firmware versions
          for (const drn in data.meterFirmwareVersions) {
            state.meterFirmwareVersions[drn] = data.meterFirmwareVersions[drn];
          }

          // Update Nextion OTA state
          if (data.nextionOtaState) {
            for (const drn in data.nextionOtaState) {
              const prev = state.nextionOtaState[drn];
              const curr = data.nextionOtaState[drn];
              if (!prev || prev.status !== curr.status || prev.progress !== curr.progress) {
                changed = true;
              }
              state.nextionOtaState[drn] = curr;
            }
          }

          if (changed) {
            // Update meters' ota_status
            state.meters.forEach(m => {
              if (state.otaState[m.drn]) {
                m.ota_status = state.otaState[m.drn];
              }
            });
            renderPage();
          }
        } catch {}
      }, 2000);
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // ─── Render ───
    function render() {
      const app = $('#app');
      if (!state.token) {
        stopPolling();
        app.innerHTML = renderLogin();
        bindLogin();
      } else {
        app.innerHTML = renderApp();
        bindApp();
        loadData();
        startPolling();
      }
    }

    // ─── Login page ───
    function renderLogin() {
      return `
        <div class="login-container">
          <div class="login-card">
            <h1>GRIDx</h1>
            <p>Firmware OTA Portal</p>
            <div id="login-error" class="login-error" style="display:none"></div>
            <label>Username</label>
            <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password">
            <button class="btn-login" id="login-btn">Sign In</button>
          </div>
        </div>
      `;
    }

    function bindLogin() {
      const btn = $('#login-btn');
      const doLogin = async () => {
        const username = $('#login-user').value;
        const password = $('#login-pass').value;
        if (!username || !password) return;
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        try {
          const data = await api('/api/login', {
            method: 'POST',
            body: JSON.stringify({ username, password }),
          });
          state.token = data.token;
          state.user = data.user;
          sessionStorage.setItem('ota_token', data.token);
          sessionStorage.setItem('ota_user', JSON.stringify(data.user));
          render();
        } catch (err) {
          const errEl = $('#login-error');
          errEl.style.display = 'block';
          errEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      };
      btn.onclick = doLogin;
      $('#login-pass').onkeydown = (e) => { if (e.key === 'Enter') doLogin(); };
    }

    // ─── Main app ───
    function renderApp() {
      return `
        <div class="app">
          <div class="sidebar">
            <div class="sidebar-logo">
              <h2>GRIDx</h2>
              <span>OTA Portal</span>
            </div>
            <div class="sidebar-nav">
              <div class="sidebar-item active" data-page="firmware">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Firmware Upload
              </div>
              <div class="sidebar-item" data-page="push">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                Push OTA
              </div>
              <div class="sidebar-item" data-page="nextion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
                Nextion Display
              </div>
              <div class="sidebar-item" data-page="meters">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Meters
              </div>
              <div class="sidebar-item" data-page="management">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15 1.65 1.65 0 003 14.08V14a2 2 0 014 0v.09a1.65 1.65 0 001 1.51zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Meter Config
              </div>
              <div class="sidebar-item" data-page="calibration">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h6l3-9 3 18 3-9h5"/></svg>
                Calibration
              </div>
              <div class="sidebar-item" data-page="netmetering">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                Net Metering
              </div>
              <div class="sidebar-item" data-page="commissioning">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                Commissioning
              </div>
              <div class="sidebar-item" data-page="sdstoken">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
                STS Token Manager
              </div>
            </div>
            <div class="sidebar-footer">
              <div style="margin-bottom:8px">Logged in as <strong>${state.user?.username || ''}</strong></div>
              <span class="logout" id="logout-btn">Sign Out</span>
            </div>
          </div>
          <div class="main" id="main-content"></div>
        </div>
      `;
    }

    let currentPage = 'firmware';

    function bindApp() {
      $('#logout-btn').onclick = logout;
      $$('.sidebar-item').forEach(item => {
        item.onclick = () => {
          $$('.sidebar-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          currentPage = item.dataset.page;
          renderPage();
        };
      });
      renderPage();
    }

    async function loadData() {
      try {
        const [fw, vers, meters, otaStatus, nxInfo, nxVers] = await Promise.all([
          api('/api/firmware/info').catch(() => null),
          api('/api/firmware/versions').catch(() => ({ versions: [] })),
          api('/api/meters').catch(() => ({ meters: [] })),
          api('/api/ota/status').catch(() => ({ otaState: {}, meterFirmwareVersions: {}, nextionOtaState: {} })),
          api('/api/nextion/info').catch(() => null),
          api('/api/nextion/versions').catch(() => ({ versions: [] })),
        ]);
        state.firmware = fw;
        state.versions = vers.versions || [];
        state.meters = meters.meters || [];
        state.otaState = otaStatus.otaState || {};
        state.meterFirmwareVersions = otaStatus.meterFirmwareVersions || {};
        state.nextion = nxInfo;
        state.nextionVersions = nxVers.versions || [];
        state.nextionOtaState = otaStatus.nextionOtaState || {};
        renderPage();
      } catch {}
    }

    function renderPage() {
      const main = $('#main-content');
      if (!main) return;
      switch (currentPage) {
        case 'firmware': main.innerHTML = renderFirmwarePage(); bindFirmwarePage(); break;
        case 'push': main.innerHTML = renderPushPage(); bindPushPage(); break;
        case 'nextion': main.innerHTML = renderNextionPage(); bindNextionPage(); break;
        case 'meters': main.innerHTML = renderMetersPage(); break;
        case 'management': main.innerHTML = renderManagementPage(); bindManagementPage(); break;
        case 'calibration': main.innerHTML = renderCalibrationPage(); bindCalibrationPage(); break;
        case 'netmetering': main.innerHTML = renderNetMeteringPage(); bindNetMeteringPage(); break;
        case 'commissioning': main.innerHTML = renderCommissioningPage(); bindCommissioningPage(); break;
        case 'sdstoken': main.innerHTML = renderSDSTokenPage(); bindSDSTokenPage(); break;
      }
    }

    // ─── Helper: get firmware status for a meter ───
    function getMeterFwStatus(meter) {
      const latestFw = state.firmware;
      const meterFw = meter.firmware_version || state.meterFirmwareVersions[meter.drn]?.version || null;
      const otaStatus = meter.ota_status || state.otaState[meter.drn] || { status: 'idle', progress: 0 };

      if (otaStatus.status === 'updating') {
        return { label: 'Updating', chipClass: 'orange', dotClass: 'orange', progress: otaStatus.progress, detail: otaStatus.detail };
      }
      if (otaStatus.status === 'complete') {
        return { label: 'Up to date', chipClass: '', dotClass: 'green', progress: 100, detail: otaStatus.detail };
      }
      if (otaStatus.status === 'error') {
        return { label: 'Error', chipClass: 'red', dotClass: 'red', progress: 0, detail: otaStatus.detail };
      }

      if (!meterFw) {
        return { label: 'Not updated', chipClass: 'gray', dotClass: 'gray', progress: null, detail: 'No update recorded' };
      }
      if (latestFw && meterFw === latestFw.version) {
        return { label: 'Up to date', chipClass: '', dotClass: 'green', progress: null, detail: '' };
      }
      return { label: 'Outdated', chipClass: 'orange', dotClass: 'orange', progress: null, detail: `Running v${meterFw}` };

          pushAllBtn.innerHTML = '<span class="spinner"></span> Pushing to all meters...';
          try {
            const data = await api('/api/nextion/push-all', { method: 'POST', body: '{}' });
            $('#nx-push-all-result').innerHTML = '<div class="alert alert-success"><strong>' + data.message + '</strong><br>Nextion v' + data.nextion.version + ' sent to: ' + data.meters.join(', ') + '</div>';

          } catch (err) {
            $('#nx-push-all-result').innerHTML = '<div class="alert alert-error">' + err.message + '</div>';

          pushOneBtn.innerHTML = '<span class="spinner"></span> Pushing...';

            const data = await api('/api/nextion/push', { method: 'POST', body: JSON.stringify({ drn }) });
            $('#nx-push-one-result').innerHTML = '<div class="alert alert-success">' + data.message + '</div>';
            loadData();
          } catch (err) {
            $('#nx-push-one-result').innerHTML = '<div class="alert alert-error">' + err.message + '</div>';
          }
          pushOneBtn.disabled = false;
          pushOneBtn.innerHTML = 'Push TFT';
        };
      }
    }

    // ─── Meters Page ───

            <div style="font-size:28px;font-weight:700;color:#60a5fa">${updatingCount}</div>
          </div>
          <div class="card" style="flex:1;min-width:160px;margin-bottom:0">
            <div style="font-size:11px;color:#62b3e0;text-transform:uppercase;letter-spacing:0.5px">Outdated / Not Updated</div>
            <div style="font-size:28px;font-weight:700;color:#fb923c">${outdatedCount}</div>
          </div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

            <button class="refresh-btn" onclick="loadData()">&#x21bb;</button>
          </div>
          ${state.meters.length === 0 ? '<div style="color:#62b3e0">No meters found in database</div>' : `
            <table>
              <thead><tr><th>DRN</th><th>Customer</th><th>City</th><th>Firmware</th><th>Status</th><th>Progress</th><th>Last Updated</th></tr></thead>
              <tbody>
                ${state.meters.map(m => {
                  const st = getMeterFwStatus(m);
                  const meterFw = m.firmware_version || state.meterFirmwareVersions[m.drn]?.version || '-';
                  const lastUpdated = m.completed_at;
                  return `
                    <tr>
                      <td class="mono">${m.drn}</td>
                      <td>${m.customer || '-'}</td>
                      <td>${m.city || '-'}</td>

                      <td>
                        <span class="status-dot ${st.dotClass}"></span>

                      </td>
                      <td style="min-width:140px">

                          <div class="progress-container">

                          <div class="progress-text">${st.progress}%</div>

    // ─── Calibration Page ───
    let calDrn = '';
    let calGains = { aigain: null, avgain: null, aicc: null, avcc: null, vrms_mv: null, irms_ma: null };
    let calProgress = null;
    let calLog = ['Ready for calibration.'];
    let calPollInterval = null;
    const GAIN_SCALE = 134217728.0; // 2^27

    function gainToFactor(reg) { return 1.0 + reg / GAIN_SCALE; }
    function factorToGain(f) { return Math.round((f - 1.0) * GAIN_SCALE); }

    function calAddLog(msg) {
      const t = new Date().toLocaleTimeString();
      calLog.push(`[${t}] ${msg}`);
      if (calLog.length > 50) calLog.shift();
      const el = document.getElementById('cal-log-text');
      if (el) { el.textContent = calLog.join('\n'); el.scrollTop = el.scrollHeight; }
    }

    function startCalPolling() {
      stopCalPolling();
      if (!calDrn) return;
      calPollInterval = setInterval(async () => {
        try {
          const data = await api(`/api/cmd/acks/${calDrn}`);
          const acks = data.acks || {};
          for (const key of Object.keys(acks)) {
            const a = acks[key];
            const p = a.payload || a;
            if (p.type === 'cal_progress') {
              calProgress = p;
              updateCalProgressUI();
            } else if (p.type === 'gains_report') {
              calGains = p;
              updateGainsUI();
              calAddLog(`Gains received: AIGAIN=0x${(p.aigain>>>0).toString(16).toUpperCase().padStart(8,'0')} AVGAIN=0x${(p.avgain>>>0).toString(16).toUpperCase().padStart(8,'0')}`);
            } else if (p.type === 'calibrate') {
              calAddLog(`${p.detail || p.status}`);
            }
          }
        } catch {}
      }, 1500);
    }

    function stopCalPolling() {
      if (calPollInterval) { clearInterval(calPollInterval); calPollInterval = null; }
    }

    function updateGainsUI() {
      const g = calGains;
      const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
      setT('g-aigain', g.aigain !== null ? '0x' + (g.aigain>>>0).toString(16).toUpperCase().padStart(8,'0') : '--');
      setT('g-avgain', g.avgain !== null ? '0x' + (g.avgain>>>0).toString(16).toUpperCase().padStart(8,'0') : '--');
      setT('g-ifactor', g.aigain !== null ? gainToFactor(g.aigain).toFixed(6) : '--');
      setT('g-vfactor', g.avgain !== null ? gainToFactor(g.avgain).toFixed(6) : '--');
      setT('g-aicc', g.aicc !== null ? g.aicc.toFixed(4) : '--');
      setT('g-avcc', g.avcc !== null ? g.avcc.toFixed(4) : '--');
      setT('g-voltage', g.vrms_mv !== null ? (g.vrms_mv / 1000).toFixed(1) + ' V' : '--');
      setT('g-current', g.irms_ma !== null ? (g.irms_ma / 1000).toFixed(3) + ' A' : '--');
    }

    function updateCalProgressUI() {
      const p = calProgress;
      if (!p) return;
      const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
      setT('cp-start-aicc', p.start_aicc?.toFixed(4) || '--');
      setT('cp-cur-aicc', p.aicc?.toFixed(4) || '--');
      setT('cp-unc-i', p.unc_i || '--');
      setT('cp-err-i', p.err_i !== undefined ? p.err_i.toFixed(2) + '%' : '--');
      setT('cp-start-avcc', p.start_avcc?.toFixed(4) || '--');
      setT('cp-cur-avcc', p.avcc?.toFixed(4) || '--');
      setT('cp-unc-v', p.unc_v || '--');
      setT('cp-err-v', p.err_v !== undefined ? p.err_v.toFixed(2) + '%' : '--');
      // Progress bars (convergence: ~2050 = done, start at ~32000)
      const pctI = p.unc_i ? Math.min(100, Math.max(0, ((32000 - Math.abs(p.unc_i)) / 30000) * 100)) : 0;
      const pctV = p.unc_v ? Math.min(100, Math.max(0, ((32000 - Math.abs(p.unc_v)) / 30000) * 100)) : 0;
      const barI = document.getElementById('cp-bar-i');
      const barV = document.getElementById('cp-bar-v');
      if (barI) barI.style.width = pctI + '%';
      if (barV) barV.style.width = pctV + '%';
      if (p.done) {
        if (barI) barI.classList.add('complete');
        if (barV) barV.classList.add('complete');
      }
      setT('cp-vrms', p.vrms_mv ? (p.vrms_mv / 1000).toFixed(1) + ' mV' : '--');
      setT('cp-irms', p.irms_ma ? (p.irms_ma / 1000).toFixed(1) + ' mA' : '--');
      setT('cp-ai-wav', p.ai_wav || '--');
      setT('cp-av-wav', p.av_wav || '--');
      const statusEl = document.getElementById('cal-status');
      if (statusEl) {
        statusEl.textContent = p.done ? 'Calibration Complete' : 'Calibrating...';
        statusEl.style.color = p.done ? '#4ade80' : '#fb923c';
        statusEl.style.background = p.done ? 'rgba(34,197,94,0.1)' : 'rgba(251,146,60,0.1)';
      }
    }

    async function calCmd(action, extra = {}, logMsg) {
      if (!calDrn) return;
      calAddLog(logMsg || `Sending: ${action}`);
      try {
        await api('/api/cmd/calibrate', { method: 'POST', body: JSON.stringify({ drn: calDrn, action, ...extra }) });
      } catch (err) { calAddLog(`Error: ${err.message}`); }
    }

    let pvNewAigain = null, pvNewAvgain = null;

    function bindCalibrationPage() {
      const drnSel = document.getElementById('cal-drn');
      if (drnSel) {
        drnSel.onchange = () => {
          calDrn = drnSel.value;
          calGains = { aigain: null, avgain: null, aicc: null, avcc: null, vrms_mv: null, irms_ma: null };
          calProgress = null;
          calLog = ['Ready for calibration.'];
          const panels = document.getElementById('cal-panels');
          if (panels) panels.style = calDrn ? '' : 'opacity:0.4;pointer-events:none';
          if (calDrn) { startCalPolling(); calCmd('read_gains', {}, 'Reading current gains...'); }
          else stopCalPolling();
        };
      }

      // Auto calibration buttons
      document.querySelectorAll('.cal-action').forEach(btn => {
        btn.onclick = () => {
          const action = btn.dataset.action;
          if (action === 'reset_defaults' && !confirm('Reset gain registers to factory defaults?')) return;
          calCmd(action, {}, `Starting ${action}...`);
        };
      });

      // Read gains
      const readBtn = document.getElementById('read-gains-btn');
      if (readBtn) readBtn.onclick = () => calCmd('read_gains', {}, 'Reading current gains...');

      // Manual gain entry
      function parseGainInput(val) {
        val = val.trim();
        if (val.startsWith('0x') || val.startsWith('0X')) return parseInt(val, 16);
        const f = parseFloat(val);
        if (!isNaN(f) && f > -10 && f < 10) return factorToGain(f);
        return parseInt(val);
      }

      const manApply = document.getElementById('man-apply-btn');
      const manSave = document.getElementById('man-save-btn');
      const doManual = (save) => {
        const ai = parseGainInput(document.getElementById('man-aigain').value);
        const av = parseGainInput(document.getElementById('man-avgain').value);
        if (isNaN(ai) || isNaN(av)) { calAddLog('Error: invalid gain values'); return; }
        calCmd('write_gains', { aigain: ai, avgain: av, save }, `Writing gains: AIGAIN=${ai} AVGAIN=${av} save=${save}`);
      };
      if (manApply) manApply.onclick = () => doManual(false);
      if (manSave) manSave.onclick = () => doManual(true);

      // Reference calibration
      const refCalc = document.getElementById('ref-calc-btn');
      if (refCalc) refCalc.onclick = () => {
        const trueV = parseFloat(document.getElementById('ref-voltage').value);
        const trueI = parseFloat(document.getElementById('ref-current').value);
        if (!calGains.vrms_mv || !calGains.irms_ma) { calAddLog('Error: read gains first to get live readings'); return; }
        const measV = calGains.vrms_mv / 1000;
        const measI = calGains.irms_ma / 1000;
        const oldVFactor = calGains.avgain !== null ? gainToFactor(calGains.avgain) : 1.0;
        const oldIFactor = calGains.aigain !== null ? gainToFactor(calGains.aigain) : 1.0;
        let newVFactor = oldVFactor, newIFactor = oldIFactor;
        if (!isNaN(trueV) && trueV > 0 && measV > 0) newVFactor = oldVFactor * (trueV / measV);
        if (!isNaN(trueI) && trueI > 0 && measI > 0) newIFactor = oldIFactor * (trueI / measI);
        pvNewAigain = factorToGain(newIFactor);
        pvNewAvgain = factorToGain(newVFactor);

        const setT = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v; };
        setT('pv-old-ai', calGains.aigain !== null ? '0x'+(calGains.aigain>>>0).toString(16).toUpperCase().padStart(8,'0') : '--');
        setT('pv-new-ai', '0x'+(pvNewAigain>>>0).toString(16).toUpperCase().padStart(8,'0'));
        setT('pv-old-av', calGains.avgain !== null ? '0x'+(calGains.avgain>>>0).toString(16).toUpperCase().padStart(8,'0') : '--');
        setT('pv-new-av', '0x'+(pvNewAvgain>>>0).toString(16).toUpperCase().padStart(8,'0'));
        setT('pv-old-v', measV.toFixed(1) + ' V');
        setT('pv-new-v', (!isNaN(trueV) && trueV > 0 ? trueV.toFixed(1) : measV.toFixed(1)) + ' V');
        setT('pv-old-i', measI.toFixed(3) + ' A');
        setT('pv-new-i', (!isNaN(trueI) && trueI > 0 ? trueI.toFixed(3) : measI.toFixed(3)) + ' A');

        document.getElementById('gain-preview-card').style.display = '';
        calAddLog(`Reference calc: new I factor=${newIFactor.toFixed(6)} V factor=${newVFactor.toFixed(6)}`);
      };

      // Preview apply/save
      const pvApply = document.getElementById('pv-apply-btn');
      const pvSave = document.getElementById('pv-save-btn');
      if (pvApply) pvApply.onclick = () => { if (pvNewAigain !== null) calCmd('write_gains', { aigain: pvNewAigain, avgain: pvNewAvgain, save: false }, 'Applying calculated gains (no save)...'); };
      if (pvSave) pvSave.onclick = () => { if (pvNewAigain !== null) calCmd('write_gains', { aigain: pvNewAigain, avgain: pvNewAvgain, save: true }, 'Applying + saving calculated gains to EEPROM...'); };

      if (calDrn) startCalPolling();
    }

    // ─── Meter Management Page ───
    let mgmtDrn = '';
    let mgmtAcks = {};
    let ackPollInterval = null;

    function startAckPolling() {
      stopAckPolling();
      if (!mgmtDrn) return;
      ackPollInterval = setInterval(async () => {
        try {
          const data = await api(`/api/cmd/acks/${mgmtDrn}`);
          mgmtAcks = data.acks || {};
          const el = document.getElementById('ack-log');
          if (el) el.innerHTML = renderAckLog();
        } catch {}
      }, 2000);
    }

    function stopAckPolling() {
      if (ackPollInterval) { clearInterval(ackPollInterval); ackPollInterval = null; }
    }

    function renderAckLog() {
      const keys = Object.keys(mgmtAcks);
      if (keys.length === 0) return '<div style="color:#62b3e0;font-size:12px">No responses yet</div>';
      return keys.slice(-10).reverse().map(k => {
        const a = mgmtAcks[k];
        const time = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : '';
        return `<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px">
          <span style="color:#4ade80">${time}</span> <span class="mono" style="color:#9ca3af">${k.replace(mgmtDrn+'_','')}</span>: <span style="color:#e0e0e0">${JSON.stringify(a.payload||a)}</span>
        </div>`;
      }).join('');
    }

    async function sendCmd(endpoint, body, resultId) {
      const el = document.getElementById(resultId);
      if (el) el.innerHTML = '<span class="spinner"></span>';
      try {
        const data = await api(`/api/cmd/${endpoint}`, { method: 'POST', body: JSON.stringify({ drn: mgmtDrn, ...body }) });
        if (el) el.innerHTML = `<div class="alert alert-success" style="margin-top:8px;padding:8px 12px">Sent: ${JSON.stringify(data.command)}</div>`;
      } catch (err) {
        if (el) el.innerHTML = `<div class="alert alert-error" style="margin-top:8px;padding:8px 12px">${err.message}</div>`;
      }
    }

    function bindManagementPage() {
      const drnSel = document.getElementById('mgmt-drn');
      if (drnSel) {
        drnSel.onchange = () => {
          mgmtDrn = drnSel.value;
          mgmtAcks = {};
          const panels = document.getElementById('mgmt-panels');
          if (panels) panels.style = mgmtDrn ? '' : 'opacity:0.4;pointer-events:none';
          if (mgmtDrn) startAckPolling(); else stopAckPolling();
        };
      }

      // Relay control
      document.querySelectorAll('.relay-btn').forEach(btn => {
        btn.onclick = () => sendCmd('relay-control', { relay: btn.dataset.relay, action: btn.dataset.action }, 'relay-result');
      });

      // Geyser mode
      const geyserModeBtn = document.getElementById('geyser-mode-btn');
      if (geyserModeBtn) geyserModeBtn.onclick = () => sendCmd('geyser-mode', { mode: document.getElementById('geyser-mode-sel').value }, 'geyser-result');

      // Geyser timer
      const timerStart = document.getElementById('geyser-timer-start');
      const timerStop = document.getElementById('geyser-timer-stop');
      if (timerStart) timerStart.onclick = () => sendCmd('geyser-timer', { action: 'start', hours: parseInt(document.getElementById('geyser-hrs').value)||0, minutes: parseInt(document.getElementById('geyser-mins').value)||0 }, 'geyser-result');
      if (timerStop) timerStop.onclick = () => sendCmd('geyser-timer', { action: 'stop' }, 'geyser-result');

      // Geyser schedule
      const schedBtn = document.getElementById('geyser-sched-btn');
      if (schedBtn) schedBtn.onclick = () => {
        const raw = document.getElementById('geyser-sched').value.trim();
        const schedules = raw.split(',').map(s => { const [start, end] = s.trim().split('-'); return { start, end }; });
        sendCmd('geyser-schedule', { schedules }, 'geyser-result');
      };

      // STS Token
      const stsBtn = document.getElementById('sts-send-btn');
      if (stsBtn) stsBtn.onclick = () => {
        const token = document.getElementById('sts-token').value.trim();
        if (!/^\d{20}$/.test(token)) { document.getElementById('sts-result').innerHTML = '<div class="alert alert-error" style="margin-top:8px;padding:8px 12px">Token must be exactly 20 digits</div>'; return; }
        sendCmd('token', { token }, 'sts-result');
      };

      // Calibration
      const calAuto = document.getElementById('cal-auto-btn');
      const calVerify = document.getElementById('cal-verify-btn');
      if (calAuto) calAuto.onclick = () => sendCmd('calibrate', { action: 'auto' }, 'cal-result');
      if (calVerify) calVerify.onclick = () => sendCmd('calibrate', { action: 'verify' }, 'cal-result');

      // Net Metering
      const nmBtn = document.getElementById('nm-send-btn');
      if (nmBtn) nmBtn.onclick = () => {
        const mode = document.getElementById('nm-mode').value;
        const feed_in_rate = parseFloat(document.getElementById('nm-rate').value) || undefined;
        sendCmd('net-metering-mode', { mode, feed_in_rate }, 'nm-result');
      };

      // Billing Mode
      const billPre = document.getElementById('bill-prepaid-btn');
      const billPost = document.getElementById('bill-postpaid-btn');
      if (billPre) billPre.onclick = () => sendCmd('billing-mode', { mode: 'prepaid' }, 'bill-result');
      if (billPost) billPost.onclick = () => sendCmd('billing-mode', { mode: 'postpaid' }, 'bill-result');

      // TOU Mode
      const touBtn = document.getElementById('tou-send-btn');
      if (touBtn) touBtn.onclick = () => sendCmd('tou-mode', { mode: parseInt(document.getElementById('tou-mode-sel').value) }, 'tou-result');

      // Device management
      document.querySelectorAll('.device-btn').forEach(btn => {
        btn.onclick = () => sendCmd('device', { action: btn.dataset.action }, 'device-result');
      });

      // Auth numbers
      const authAdd = document.getElementById('auth-add-btn');
      const authRemove = document.getElementById('auth-remove-btn');
      const authList = document.getElementById('auth-list-btn');
      if (authAdd) authAdd.onclick = () => { const n = document.getElementById('auth-number').value.trim(); if(!n){return;} sendCmd('auth-numbers', { action: 'add', number: n }, 'auth-result'); };
      if (authRemove) authRemove.onclick = () => { const n = document.getElementById('auth-number').value.trim(); if(!n){return;} sendCmd('auth-numbers', { action: 'remove', number: n }, 'auth-result'); };
      if (authList) authList.onclick = () => sendCmd('auth-numbers', { action: 'list' }, 'auth-result');

      // Commissioning
      document.querySelectorAll('.comm-btn').forEach(btn => {
        btn.onclick = () => sendCmd('commissioning', { action: btn.dataset.action }, 'comm-result');
      });

      // Energy test
      const etestStart = document.getElementById('etest-start-btn');
      const etestStatus = document.getElementById('etest-status-btn');
      if (etestStart) etestStart.onclick = () => sendCmd('energy-test', { action: 'start', duration_s: parseInt(document.getElementById('etest-duration').value)||60 }, 'comm-result');
      if (etestStatus) etestStatus.onclick = () => sendCmd('energy-test', { action: 'status' }, 'comm-result');

      // Raw command
      const rawBtn = document.getElementById('raw-send-btn');
      if (rawBtn) rawBtn.onclick = async () => {
        const input = document.getElementById('raw-cmd').value.trim();
        try {
          const payload = JSON.parse(input);
          const el = document.getElementById('raw-result');
          el.innerHTML = '<span class="spinner"></span>';
          const data = await api('/api/cmd/send', { method: 'POST', body: JSON.stringify({ drn: mgmtDrn, payload }) });
          el.innerHTML = `<div class="alert alert-success" style="margin-top:8px;padding:8px 12px">Published to ${data.topic}</div>`;
        } catch (err) {
          document.getElementById('raw-result').innerHTML = `<div class="alert alert-error" style="margin-top:8px;padding:8px 12px">${err.message || 'Invalid JSON'}</div>`;
        }
      };

      if (mgmtDrn) startAckPolling();
    }

    // ─── Net Metering Page ───
    let nmDrn = '';
    let nmAcks = [];
    let nmPollInterval = null;
    let nmPolarityStatus = { status: 'unknown', message: '' };
    let nmEnergy = { import_kwh: null, export_kwh: null, net_kwh: null };
    let nmLive = { voltage: null, current: null, power: null, pf: null, direction: 'IDLE' };
    let nmHourly = [];
    let nmDaily = [];

    function nmSendCmd(endpoint, body, resultId) {
      const el = document.getElementById(resultId);
      if (el) el.innerHTML = '<span style="color:#fbbf24">Sending...</span>';
      api(`/api/cmd/${endpoint}`, { method: 'POST', body: JSON.stringify({ drn: nmDrn, ...body }) })
        .then(d => { if (el) el.innerHTML = `<span style="color:#4ade80">Sent</span>`; })
        .catch(e => { if (el) el.innerHTML = `<span style="color:#f87171">${e.message}</span>`; });
    }

    function startNmPolling() {
      stopNmPolling();
      if (!nmDrn) return;
      nmPollInterval = setInterval(async () => {
        try {
          const data = await api(`/api/cmd/acks/${nmDrn}`);
          const acks = data.acks || {};
          for (const key of Object.keys(acks)) {
            const a = acks[key];
            const p = a.payload || a;
            if (p.type === 'polarity') {
              nmPolarityStatus = { status: p.status || 'unknown', message: p.message || '' };
              updateNmPolarityUI();
            } else if (p.type === 'energy_report' || p.type === 'net_energy_report') {
              nmEnergy = { import_kwh: p.import_kwh ?? nmEnergy.import_kwh, export_kwh: p.export_kwh ?? nmEnergy.export_kwh, net_kwh: p.net_kwh ?? nmEnergy.net_kwh };
              updateNmEnergyUI();
            } else if (p.type === 'power_report') {
              nmLive = { voltage: p.voltage ?? null, current: p.current ?? null, power: p.power ?? null, pf: p.power_factor ?? null, direction: p.direction || 'IDLE' };
              updateNmLiveUI();
            } else if (p.type === 'hourly_breakdown') {
              nmHourly = p.hours || [];
              updateNmHourlyUI();
            } else if (p.type === 'daily_trend') {
              nmDaily = p.days || [];
              updateNmDailyUI();
            }
          }
        } catch {}
      }, 2000);
    }

    function stopNmPolling() {
      if (nmPollInterval) { clearInterval(nmPollInterval); nmPollInterval = null; }
    }

    function updateNmPolarityUI() {
      const el = document.getElementById('nm-polarity-result');
      if (!el) return;
      const s = nmPolarityStatus.status.toUpperCase();
      let badgeBg = '#374151', badgeColor = '#9ca3af';
      if (s === 'NORMAL') { badgeBg = '#065f46'; badgeColor = '#4ade80'; }
      else if (s === 'REVERSED') { badgeBg = '#7f1d1d'; badgeColor = '#f87171'; }
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <span style="font-size:9px;padding:2px 8px;border-radius:4px;text-transform:uppercase;font-weight:700;background:${badgeBg};color:${badgeColor}">${s}</span>
        </div>
        <div style="font-size:12px;color:#9ca3af">${nmPolarityStatus.message || 'Polarity check complete'}</div>
      `;
    }

    function updateNmEnergyUI() {
      const setV = (id, v) => { const e = document.getElementById(id); if (e) e.textContent = v !== null ? v.toFixed(2) : '---'; };
      setV('nm-import-val', nmEnergy.import_kwh);
      setV('nm-export-val', nmEnergy.export_kwh);
      setV('nm-net-val', nmEnergy.net_kwh);
    }

    function updateNmLiveUI() {
      const setV = (id, v, unit) => { const e = document.getElementById(id); if (e) e.textContent = v !== null ? v.toFixed(2) : '---'; };
      setV('nm-voltage-val', nmLive.voltage);
      setV('nm-current-val', nmLive.current);
      setV('nm-power-val', nmLive.power);
      setV('nm-pf-val', nmLive.pf);
      const badge = document.getElementById('nm-direction-badge');
      if (badge) {
        const dir = nmLive.direction.toUpperCase();
        let bg = '#374151', col = '#9ca3af';
        if (dir === 'IMPORTING') { bg = '#7f1d1d'; col = '#f87171'; }
        else if (dir === 'EXPORTING') { bg = '#065f46'; col = '#4ade80'; }
        badge.style.background = bg;
        badge.style.color = col;
        badge.textContent = dir;
      }
    }

    function updateNmHourlyUI() {
      const el = document.getElementById('nm-hourly-chart');
      if (!el) return;
      if (nmHourly.length === 0) { el.innerHTML = '<div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px">Awaiting data...</div>'; return; }
      const maxVal = Math.max(...nmHourly.map(h => Math.max(h.import || 0, h.export || 0)), 1);
      let peakImport = 0, peakExport = 0;
      nmHourly.forEach(h => { peakImport = Math.max(peakImport, h.import || 0); peakExport = Math.max(peakExport, h.export || 0); });
      let html = `<div style="display:flex;gap:4px;align-items:flex-end;height:120px;margin-bottom:8px">`;
      nmHourly.forEach(h => {
        const impH = ((h.import || 0) / maxVal) * 100;
        const expH = ((h.export || 0) / maxVal) * 100;
        html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;height:100%;justify-content:flex-end">
          <div style="width:100%;background:#FF5722;border-radius:2px 2px 0 0;height:${impH}%"></div>
          <div style="width:100%;background:#4CAF50;border-radius:0 0 2px 2px;height:${expH}%"></div>
          <div style="font-size:8px;color:#9ca3af;margin-top:2px">${h.hour ?? ''}</div>
        </div>`;
      });
      html += `</div>`;
      html += `<div style="display:flex;gap:16px;font-size:10px;color:#9ca3af">
        <span><span style="display:inline-block;width:8px;height:8px;background:#FF5722;border-radius:2px;margin-right:4px"></span>Import</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:#4CAF50;border-radius:2px;margin-right:4px"></span>Export</span>
        <span style="margin-left:auto">Peak Import: ${peakImport.toFixed(2)} kWh | Peak Export: ${peakExport.toFixed(2)} kWh</span>
      </div>`;
      el.innerHTML = html;
    }

    function updateNmDailyUI() {
      const el = document.getElementById('nm-daily-table');
      if (!el) return;
      if (nmDaily.length === 0) { el.innerHTML = '<div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px">Awaiting data...</div>'; return; }
      let html = `<table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="color:#60a5fa;text-transform:uppercase;font-size:10px;letter-spacing:0.5px">
          <th style="text-align:left;padding:6px 8px">Date</th><th style="text-align:right;padding:6px 8px">Import (kWh)</th><th style="text-align:right;padding:6px 8px">Export (kWh)</th><th style="text-align:right;padding:6px 8px">Net</th>
        </tr></thead><tbody>`;
      nmDaily.slice(-7).forEach(d => {
        const net = (d.import || 0) - (d.export || 0);
        const netColor = net >= 0 ? '#f87171' : '#4ade80';
        html += `<tr style="border-top:1px solid rgba(255,255,255,0.04)">
          <td style="padding:6px 8px;color:#e0e0e0">${d.date || '--'}</td>
          <td style="padding:6px 8px;text-align:right;font-family:monospace;color:#FF5722">${(d.import || 0).toFixed(2)}</td>
          <td style="padding:6px 8px;text-align:right;font-family:monospace;color:#4CAF50">${(d.export || 0).toFixed(2)}</td>
          <td style="padding:6px 8px;text-align:right;font-family:monospace;font-weight:700;color:${netColor}">${net.toFixed(2)}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      el.innerHTML = html;
    }

    function bindNetMeteringPage() {
      const drnSel = document.getElementById('nm-drn');
      if (drnSel) {
        drnSel.onchange = () => {
          nmDrn = drnSel.value;
          nmPolarityStatus = { status: 'unknown', message: '' };
          nmEnergy = { import_kwh: null, export_kwh: null, net_kwh: null };
          nmLive = { voltage: null, current: null, power: null, pf: null, direction: 'IDLE' };
          nmHourly = [];
          nmDaily = [];
          const panels = document.getElementById('nm-panels');
          if (panels) panels.style = nmDrn ? '' : 'opacity:0.4;pointer-events:none';
          if (nmDrn) startNmPolling();
          else stopNmPolling();
        };
      }

      // Polarity controls
      const polSet = document.getElementById('nm-polarity-set');
      if (polSet) polSet.onclick = () => {
        const mode = parseInt(document.getElementById('nm-polarity-mode').value);
        nmSendCmd('polarity', { action: 'set_mode', mode }, 'nm-polarity-cmd-result');
      };
      const polCheck = document.getElementById('nm-polarity-check');
      if (polCheck) polCheck.onclick = () => nmSendCmd('polarity', { action: 'check' }, 'nm-polarity-cmd-result');
      const polFix = document.getElementById('nm-polarity-fix');
      if (polFix) polFix.onclick = () => nmSendCmd('polarity', { action: 'fix' }, 'nm-polarity-cmd-result');

      // Energy reset
      const resetImport = document.getElementById('nm-reset-import');
      if (resetImport) resetImport.onclick = () => nmSendCmd('energy-reset', { target: 'import' }, 'nm-reset-result');
      const resetExport = document.getElementById('nm-reset-export');
      if (resetExport) resetExport.onclick = () => nmSendCmd('energy-reset', { target: 'export' }, 'nm-reset-result');
      const resetAll = document.getElementById('nm-reset-all');
      if (resetAll) resetAll.onclick = () => {
        if (!confirm('Reset all energy counters? This cannot be undone.')) return;
        nmSendCmd('energy-reset', { target: 'all' }, 'nm-reset-result');
      };

      // Solar config
      const solarToggle = document.getElementById('nm-solar-toggle');
      if (solarToggle) solarToggle.onchange = () => {
        const enabled = solarToggle.checked;
        const info = document.getElementById('nm-solar-info');
        if (info) info.style.display = enabled ? '' : 'none';
        nmSendCmd('solar-config', { enabled }, 'nm-solar-result');
      };

      // Refresh energy
      const refreshBtn = document.getElementById('nm-refresh-energy');
      if (refreshBtn) refreshBtn.onclick = () => nmSendCmd('device', { action: 'energy_usage_request' }, '');

      if (nmDrn) startNmPolling();
    }

    // ─── Commissioning Page ───
    let comDrn = '';
    let comAcks = [];
    let comPollInterval = null;
    let comMeasurement = { voltage: null, current: null, power: null, v_error: null, i_error: null, p_error: null, v_status: 'IDLE', i_status: 'IDLE', p_status: 'IDLE', v_high: null, v_low: null, i_high: null, i_low: null, p_high: null, p_low: null };
    let comLoad = { status: 'OFF', current: null, result: '', reason: '', progress: 0 };
    let comEnergyTest = { progress: 0, duration: null, samples: null, result: '', avg_power: null, avg_voltage: null, avg_current: null };
    let comAutoCalStatus = '';
    let comLastData = '';
    let comFullTest = { progress: 0, status: '' };

    function comSendCmd(endpoint, body, resultId) {
      const el = document.getElementById(resultId);
      if (el) el.innerHTML = '<span style="color:#fbbf24">Sending...</span>';
      api(`/api/cmd/${endpoint}`, { method: 'POST', body: JSON.stringify({ drn: comDrn, ...body }) })
        .then(d => { if (el) el.innerHTML = `<span style="color:#4ade80">Sent</span>`; })
        .catch(e => { if (el) el.innerHTML = `<span style="color:#f87171">${e.message}</span>`; });
    }

    function startComPolling() {
      stopComPolling();
      if (!comDrn) return;
      comPollInterval = setInterval(async () => {
        try {
          const data = await api(`/api/cmd/acks/${comDrn}`);
          const acks = data.acks || {};
          for (const key of Object.keys(acks)) {
            const a = acks[key];
            const p = a.payload || a;
            if (p.type === 'measurement_result') {
              comMeasurement = { voltage: p.voltage ?? null, current: p.current ?? null, power: p.power ?? null, v_error: p.v_error ?? null, i_error: p.i_error ?? null, p_error: p.p_error ?? null, v_status: p.v_status || 'IDLE', i_status: p.i_status || 'IDLE', p_status: p.p_status || 'IDLE', v_high: p.v_high ?? null, v_low: p.v_low ?? null, i_high: p.i_high ?? null, i_low: p.i_low ?? null, p_high: p.p_high ?? null, p_low: p.p_low ?? null };
              comAutoCalStatus = p.auto_cal_status || comAutoCalStatus;
              comLastData = p.timestamp ? new Date(p.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
              updateComMeasurementUI();
            } else if (p.type === 'load_test_result') {
              comLoad = { status: p.load_status || 'OFF', current: p.load_current ?? null, result: p.result || '', reason: p.reason || '', progress: p.progress ?? comLoad.progress };
              updateComLoadUI();
            } else if (p.type === 'energy_test_result') {
              comEnergyTest = { progress: p.progress ?? 0, duration: p.duration ?? null, samples: p.samples ?? null, result: p.result || '', avg_power: p.avg_power ?? null, avg_voltage: p.avg_voltage ?? null, avg_current: p.avg_current ?? null };
              updateComEnergyTestUI();
            } else if (p.type === 'full_system_test') {
              comFullTest = { progress: p.progress ?? 0, status: p.status || '' };
              updateComFullTestUI();
            }
          }
        } catch {}
      }, 2000);
    }

    function stopComPolling() {
      if (comPollInterval) { clearInterval(comPollInterval); comPollInterval = null; }
    }

    function updateComMeasurementUI() {
      const m = comMeasurement;
      // Auto-cal banner
      const banner = document.getElementById('com-autocal-banner');
      if (banner) { banner.style.display = comAutoCalStatus ? '' : 'none'; banner.textContent = comAutoCalStatus; }
      // Last data
      const lastEl = document.getElementById('com-last-data');
      if (lastEl) lastEl.textContent = comLastData ? `Last data: ${comLastData}` : '';
      // Values
      const setMetric = (prefix, value, error, status, high, low) => {
        const valEl = document.getElementById(`com-${prefix}-val`);
        const errEl = document.getElementById(`com-${prefix}-err`);
        const barEl = document.getElementById(`com-${prefix}-bar`);
        const highEl = document.getElementById(`com-${prefix}-high`);
        const lowEl = document.getElementById(`com-${prefix}-low`);
        const badgeEl = document.getElementById(`com-${prefix}-badge`);
        if (valEl) valEl.textContent = value !== null ? value.toFixed(2) : '---';
        if (errEl) errEl.textContent = error !== null ? error.toFixed(2) + '%' : '--%';
        if (barEl) {
          const pct = error !== null ? Math.min(Math.abs(error) * 10, 100) : 0;
          barEl.style.width = pct + '%';
          barEl.style.background = status === 'PASS' ? '#4ade80' : status === 'FAIL' ? '#f87171' : '#60a5fa';
        }
        if (highEl) highEl.textContent = high !== null ? high.toFixed(2) : '--';
        if (lowEl) lowEl.textContent = low !== null ? low.toFixed(2) : '--';
        if (badgeEl) {
          let bg = '#374151', col = '#9ca3af';
          if (status === 'PASS') { bg = '#065f46'; col = '#4ade80'; }
          else if (status === 'FAIL') { bg = '#7f1d1d'; col = '#f87171'; }
          badgeEl.style.background = bg;
          badgeEl.style.color = col;
          badgeEl.textContent = status;
        }
      };
      setMetric('v', m.voltage, m.v_error, m.v_status, m.v_high, m.v_low);
      setMetric('i', m.current, m.i_error, m.i_status, m.i_high, m.i_low);
      setMetric('p', m.power, m.p_error, m.p_status, m.p_high, m.p_low);
    }

    function updateComLoadUI() {
      const l = comLoad;
      const progEl = document.getElementById('com-load-progress');
      if (progEl) progEl.style.width = l.progress + '%';
      const statusEl = document.getElementById('com-load-status-val');
      if (statusEl) statusEl.textContent = l.status;
      const curEl = document.getElementById('com-load-current-val');
      if (curEl) curEl.textContent = l.current !== null ? l.current.toFixed(2) + ' A' : '---';
      const resEl = document.getElementById('com-load-result-val');
      if (resEl) {
        resEl.textContent = l.result || '---';
        resEl.style.color = l.result === 'PASS' ? '#4ade80' : l.result === 'FAIL' ? '#f87171' : '#f3f4f6';
      }
      const reasonEl = document.getElementById('com-load-reason');
      if (reasonEl) reasonEl.textContent = l.reason || '';
    }

    function updateComEnergyTestUI() {
      const e = comEnergyTest;
      const progEl = document.getElementById('com-energy-progress');
      if (progEl) progEl.style.width = e.progress + '%';
      const setV = (id, v, suffix) => { const el = document.getElementById(id); if (el) el.textContent = v !== null ? v.toFixed(2) + (suffix||'') : '---'; };
      setV('com-energy-duration', e.duration, 's');
      setV('com-energy-samples', e.samples, '');
      const resEl = document.getElementById('com-energy-result-val');
      if (resEl) { resEl.textContent = e.result || '---'; resEl.style.color = e.result === 'PASS' ? '#4ade80' : e.result === 'FAIL' ? '#f87171' : '#f3f4f6'; }
      setV('com-energy-avg-power', e.avg_power, ' W');
      setV('com-energy-avg-voltage', e.avg_voltage, ' V');
      setV('com-energy-avg-current', e.avg_current, ' A');
    }

    function updateComFullTestUI() {
      const f = comFullTest;
      const progEl = document.getElementById('com-full-progress');
      if (progEl) progEl.style.width = f.progress + '%';

    function bindCommissioningPage() {
      const drnSel = document.getElementById('com-drn');
      if (drnSel) {

          comDrn = drnSel.value;
          comMeasurement = { voltage: null, current: null, power: null, v_error: null, i_error: null, p_error: null, v_status: 'IDLE', i_status: 'IDLE', p_status: 'IDLE', v_high: null, v_low: null, i_high: null, i_low: null, p_high: null, p_low: null };
          comLoad = { status: 'OFF', current: null, result: '', reason: '', progress: 0 };
          comEnergyTest = { progress: 0, duration: null, samples: null, result: '', avg_power: null, avg_voltage: null, avg_current: null };
          comAutoCalStatus = '';
          comLastData = '';
          comFullTest = { progress: 0, status: '' };
          const panels = document.getElementById('com-panels');
          if (panels) panels.style = comDrn ? '' : 'opacity:0.4;pointer-events:none';
          // Set DRN in registration field
          const regDrn = document.getElementById('com-reg-drn');
          if (regDrn) regDrn.value = comDrn;
          if (comDrn) startComPolling();
          else stopComPolling();
        };
      }

      // Update ref power display when voltage/current change
      const updateRefPower = () => {
        const v = parseFloat(document.getElementById('com-ref-voltage').value) || 0;
        const i = parseFloat(document.getElementById('com-ref-current').value) || 0;
        const pEl = document.getElementById('com-ref-power');
        if (pEl) pEl.value = (v * i) + 'W (auto)';
      };
      const refV = document.getElementById('com-ref-voltage');
      const refI = document.getElementById('com-ref-current');
      if (refV) refV.onchange = updateRefPower;
      if (refI) refI.onchange = updateRefPower;
      updateRefPower();

      // Measurement controls
      const measureStart = document.getElementById('com-measure-start');
      if (measureStart) measureStart.onclick = () => {
        const ref_voltage = parseFloat(document.getElementById('com-ref-voltage').value);
        const ref_current = parseFloat(document.getElementById('com-ref-current').value);
        const ref_power = ref_voltage * ref_current;
        comSendCmd('measurement-test', { action: 'start', ref_voltage, ref_current, ref_power }, 'com-measure-result');
      };
      const measureAuto = document.getElementById('com-measure-autocal');
      if (measureAuto) measureAuto.onclick = () => {
        const ref_voltage = parseFloat(document.getElementById('com-ref-voltage').value);
        const ref_current = parseFloat(document.getElementById('com-ref-current').value);
        const ref_power = ref_voltage * ref_current;
        comSendCmd('measurement-test', { action: 'auto_calibration', ref_voltage, ref_current, ref_power }, 'com-measure-result');
      };

      // Load testing
      const loadOn = document.getElementById('com-load-on');
      if (loadOn) loadOn.onclick = () => comSendCmd('load-test', { action: 'on' }, 'com-load-cmd-result');
      const loadOff = document.getElementById('com-load-off');
      if (loadOff) loadOff.onclick = () => comSendCmd('load-test', { action: 'off' }, 'com-load-cmd-result');
      const loadRange = document.getElementById('com-load-range');
      if (loadRange) loadRange.onclick = () => comSendCmd('load-test', { action: 'range_test' }, 'com-load-cmd-result');

      // API testing
      const apiTest = document.getElementById('com-api-test');
      if (apiTest) apiTest.onclick = () => comSendCmd('device', { action: 'energy_usage_request' }, 'com-api-result');

      // Net metering test
      const nmStart = document.getElementById('com-nm-start');
      if (nmStart) nmStart.onclick = () => comSendCmd('net-metering-test', { action: 'start' }, 'com-nm-result');
      const nmFix = document.getElementById('com-nm-fix');
      if (nmFix) nmFix.onclick = () => comSendCmd('net-metering-test', { action: 'fix_polarity' }, 'com-nm-result');

      // Full system test
      const fullStart = document.getElementById('com-full-start');
      if (fullStart) fullStart.onclick = () => comSendCmd('full-system-test', { action: 'start' }, 'com-full-cmd-result');
      const fullReport = document.getElementById('com-full-report');
      if (fullReport) fullReport.onclick = () => comSendCmd('full-system-test', { action: 'send_report' }, 'com-full-cmd-result');
      const fullClear = document.getElementById('com-full-clear');
      if (fullClear) fullClear.onclick = () => {
        comMeasurement = { voltage: null, current: null, power: null, v_error: null, i_error: null, p_error: null, v_status: 'IDLE', i_status: 'IDLE', p_status: 'IDLE', v_high: null, v_low: null, i_high: null, i_low: null, p_high: null, p_low: null };
        comLoad = { status: 'OFF', current: null, result: '', reason: '', progress: 0 };
        comEnergyTest = { progress: 0, duration: null, samples: null, result: '', avg_power: null, avg_voltage: null, avg_current: null };
        comFullTest = { progress: 0, status: '' };
        updateComMeasurementUI();
        updateComLoadUI();
        updateComEnergyTestUI();
        updateComFullTestUI();
        comSendCmd('full-system-test', { action: 'clear' }, 'com-full-cmd-result');
      };

      // Meter registration
      const regSubmit = document.getElementById('com-reg-submit');
      if (regSubmit) regSubmit.onclick = () => {
        const body = {
          region: document.getElementById('com-reg-region').value,
          sub_region: document.getElementById('com-reg-subregion').value,
          area: document.getElementById('com-reg-area').value,

        comSendCmd('register-meter', body, 'com-reg-result');

      // Set initial DRN in registration field
      const regDrn = document.getElementById('com-reg-drn');
      if (regDrn) regDrn.value = comDrn;

      if (comDrn) startComPolling();
    }

    function sdsFormatTokenInput(el) {
      let val = el.value.replace(/[^\d]/g, '');
      if (val.length > 20) val = val.slice(0, 20);
      let formatted = '';
      for (let i = 0; i < val.length; i++) {
        if (i > 0 && i % 4 === 0) formatted += ' ';
        formatted += val[i];
      }
      el.value = formatted;
    }

    function sdsIsValid20(el) {
      return /^\d{20}$/.test((el.value || '').replace(/\s/g, ''));
    }

    function bindSDSTokenPage() {
      const typeSelect = document.getElementById('sds-token-type');
      const singleArea = document.getElementById('sds-single-token-area');
      const kcArea = document.getElementById('sds-keychange-token-area');
      const tokenInput = document.getElementById('sds-token-input');
      const kcToken1 = document.getElementById('sds-kc-token-1');
      const kcToken2 = document.getElementById('sds-kc-token-2');
      const kcToken3 = document.getElementById('sds-kc-token-3');
      const kcHas3rd = document.getElementById('sds-kc-has-3rd');
      const kc3rdArea = document.getElementById('sds-kc-token-3-area');
      const sendBtn = document.getElementById('sds-send-btn');
      const searchInput = document.getElementById('sds-meter-search');
      const countSpan = document.getElementById('sds-selected-count');

      function isKeyChange() { return typeSelect.value === 'key_change'; }

      function updateVisibility() {
        const kc = isKeyChange();
        singleArea.style.display = kc ? 'none' : '';
        kcArea.style.display = kc ? '' : 'none';
        updateCount();
      }

      function updateCount() {
        const n = sdsSelectedMeters.size;
        countSpan.textContent = `${n} meter${n !== 1 ? 's' : ''} selected`;
        if (isKeyChange()) {
          const valid1 = sdsIsValid20(kcToken1);
          const valid2 = sdsIsValid20(kcToken2);
          const valid3 = !kcHas3rd.checked || sdsIsValid20(kcToken3);
          sendBtn.disabled = n === 0 || !valid1 || !valid2 || !valid3;
        } else {
          sendBtn.disabled = n === 0 || !sdsIsValid20(tokenInput);
        }
      }

      typeSelect.addEventListener('change', updateVisibility);
      kcHas3rd.addEventListener('change', () => {
        kc3rdArea.style.display = kcHas3rd.checked ? '' : 'none';
        updateCount();
      });

      [tokenInput, kcToken1, kcToken2, kcToken3].forEach(el => {
        el.addEventListener('input', () => { sdsFormatTokenInput(el); updateCount(); });
      });

      document.querySelectorAll('.sds-meter-cb').forEach(cb => {
        cb.addEventListener('change', () => {
          if (cb.checked) sdsSelectedMeters.add(cb.value);
          else sdsSelectedMeters.delete(cb.value);
          updateCount();
        });
      });

      document.getElementById('sds-select-all').onclick = () => {
        const visible = document.querySelectorAll('.sds-meter-row:not([style*="display: none"]) .sds-meter-cb');
        visible.forEach(cb => { cb.checked = true; sdsSelectedMeters.add(cb.value); });
        updateCount();
      };

      document.getElementById('sds-deselect-all').onclick = () => {
        document.querySelectorAll('.sds-meter-cb').forEach(cb => { cb.checked = false; });
        sdsSelectedMeters.clear();
        updateCount();
      };

      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase();
        document.querySelectorAll('.sds-meter-row').forEach(row => {
          const drn = row.dataset.drn || '';
          const name = row.dataset.name || '';
          row.style.display = (!q || drn.includes(q) || name.includes(q)) ? '' : 'none';
        });
      });

      sendBtn.onclick = async () => {
        const drns = Array.from(sdsSelectedMeters);
        if (drns.length === 0) return;
        const notes = document.getElementById('sds-token-notes').value;
        const resultDiv = document.getElementById('sds-send-result');

        sendBtn.disabled = true;
        sendBtn.textContent = 'Sending...';

        try {
          if (isKeyChange()) {
            const tokens = [
              kcToken1.value.replace(/\s/g, ''),
              kcToken2.value.replace(/\s/g, '')
            ];
            if (kcHas3rd.checked) tokens.push(kcToken3.value.replace(/\s/g, ''));

            const labels = ['key_change_1', 'key_change_2', 'key_change_3'];
            const allLogEntries = [];

            for (let i = 0; i < tokens.length; i++) {
              if (i > 0) {
                resultDiv.innerHTML = `<div class="alert alert-info" style="margin-top:12px">Sending token ${i + 1} of ${tokens.length} in 2 seconds...</div>`;
                await new Promise(r => setTimeout(r, 2000));
              }

              const res = await api('/api/cmd/token-broadcast', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ drns, token: tokens[i], label: labels[i] })
              });

              const logEntry = {
                batchId: res.batchId,
                token: tokens[i], label: labels[i], notes: notes + (tokens.length > 1 ? ` (${i+1}/${tokens.length})` : ''),
                drns: [...drns], sentAt: new Date().toISOString(), results: {}
              };
              drns.forEach(d => logEntry.results[d] = { status: 'sent' });
              sdsBroadcastLog.unshift(logEntry);
              allLogEntries.push(logEntry);
            }

            resultDiv.innerHTML = `<div class="alert alert-success" style="margin-top:12px">All ${tokens.length} key change tokens sent to ${drns.length} meter${drns.length !== 1 ? 's' : ''} in sequence. Waiting for acknowledgements...</div>`;
            renderBroadcastLog();
            allLogEntries.forEach(e => startSdsAckPolling(e));

          } else {
            const token = tokenInput.value.replace(/\s/g, '');
            const label = typeSelect.value;

            const res = await api('/api/cmd/token-broadcast', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ drns, token, label })
            });

            const logEntry = {
              batchId: res.batchId,
              token, label, notes,
              drns: [...drns], sentAt: new Date().toISOString(), results: {}
            };
            drns.forEach(d => logEntry.results[d] = { status: 'sent' });
            sdsBroadcastLog.unshift(logEntry);

            resultDiv.innerHTML = `<div class="alert alert-success" style="margin-top:12px">Token sent to ${drns.length} meter${drns.length !== 1 ? 's' : ''}. Waiting for acknowledgements...</div>`;
            renderBroadcastLog();
            startSdsAckPolling(logEntry);
          }
        } catch (err) {
          resultDiv.innerHTML = `<div class="alert alert-error" style="margin-top:12px">Error: ${err.message || 'Failed to send'}</div>`;
        }

        sendBtn.disabled = false;
        sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg> Send to Selected Meters';
        updateCount();
      };

      updateVisibility();
      renderBroadcastLog();
    }

    function renderBroadcastLog() {
      const container = document.getElementById('sds-broadcast-log');
      if (!container) return;
      if (sdsBroadcastLog.length === 0) {
        container.innerHTML = '<div style="font-size:12px;color:#9ca3af;padding:12px;text-align:center">No tokens sent yet</div>';
        return;
      }

      container.innerHTML = sdsBroadcastLog.map(entry => {
        const tokenTypes = {
          credit: 'Credit Transfer', key_change: 'Key Change', key_change_1: 'Key Change 1st', key_change_2: 'Key Change 2nd',
          key_change_3: 'Key Change 3rd (SGC)', set_tariff: 'Set Tariff', set_power_limit: 'Power Limit',
          clear_credit: 'Clear Credit', clear_tamper: 'Clear Tamper', management: 'Management'
        };
        const typeLabel = tokenTypes[entry.label] || entry.label;
        const total = entry.drns.length;
        const acked = Object.values(entry.results).filter(r => r.status === 'acked').length;
        const errors = Object.values(entry.results).filter(r => r.status === 'error').length;

        return `
          <div style="background:#0f1420;border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid ${errors > 0 ? '#ef4444' : acked === total ? '#22c55e' : '#3b82f6'}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span class="chip ${entry.label.startsWith('key_change') ? 'orange' : ''}" style="font-size:10px">${typeLabel}</span>
              <span style="font-size:10px;color:#62b3e0">${new Date(entry.sentAt).toLocaleTimeString()}</span>
            </div>
            <div style="font-family:monospace;font-size:13px;color:#4ade80;letter-spacing:1px;margin-bottom:4px">${entry.token.replace(/(\d{4})/g, '$1 ').trim()}</div>
            ${entry.notes ? `<div style="font-size:11px;color:#9ca3af;margin-bottom:4px">${entry.notes}</div>` : ''}
            <div style="font-size:11px;color:#9ca3af">
              Sent to <strong style="color:#e0e0e0">${total}</strong> meter${total !== 1 ? 's' : ''}
              ${acked > 0 ? ` &bull; <span style="color:#4ade80">${acked} acknowledged</span>` : ''}
              ${errors > 0 ? ` &bull; <span style="color:#f87171">${errors} failed</span>` : ''}
              ${acked + errors < total ? ` &bull; <span style="color:#60a5fa">${total - acked - errors} pending</span>` : ''}
            </div>
            <div style="margin-top:6px">
              ${entry.drns.map(drn => {
                const r = entry.results[drn] || {};
                const statusColor = r.status === 'acked' ? '#4ade80' : r.status === 'error' ? '#f87171' : '#62b3e0';
                const statusIcon = r.status === 'acked' ? '&#10003;' : r.status === 'error' ? '&#10007;' : '&#8987;';
                const resultText = r.resultText || '';
                return `<div style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:monospace;color:${statusColor};background:rgba(255,255,255,0.03);padding:2px 6px;border-radius:4px;margin:1px">${statusIcon} ${drn}${resultText ? ' - ' + resultText : ''}</div>`;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function startSdsAckPolling(logEntry) {
      let checks = 0;
      const maxChecks = 30;
      const interval = setInterval(async () => {
        checks++;
        if (checks > maxChecks || currentPage !== 'sdstoken') {
          clearInterval(interval);
          return;
        }

        try {
          const allDone = logEntry.drns.every(d => logEntry.results[d]?.status === 'acked' || logEntry.results[d]?.status === 'error');
          if (allDone) { clearInterval(interval); return; }

          for (const drn of logEntry.drns) {
            if (logEntry.results[drn]?.status !== 'sent') continue;
            try {
              const acks = await api(`/api/cmd/acks/${drn}`);
              if (acks) {
                const tokenAck = acks[`${drn}_token`];
                const tokenResult = acks[`${drn}_token_result`];
                if (tokenAck || tokenResult) {
                  const ackData = tokenResult || tokenAck;
                  const isOk = ackData.status === 'ok' || ackData.result === 0 || (ackData.data && Array.isArray(ackData.data) && ackData.data[3] === 'Accept');
                  logEntry.results[drn].status = isOk ? 'acked' : 'error';
                  logEntry.results[drn].resultText = isOk ? 'Accepted' : (ackData.status || 'Rejected');

                  const statusEl = document.querySelector(`.sds-meter-status[data-drn="${drn}"]`);
                  if (statusEl) {
                    statusEl.innerHTML = isOk
                      ? '<span style="color:#4ade80">&#10003;</span>'
                      : '<span style="color:#f87171">&#10007;</span>';
                  }
                }
              }
            } catch {}
          }
          renderBroadcastLog();
        } catch {}
      }, 2000);
    }

    // ─── Init ───
    render();
  </script>
</body>
