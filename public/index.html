<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRIDx OTA Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e0e0e0; min-height: 100vh; }

    /* Login */
    .login-container {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: linear-gradient(135deg, #0a0e1a 0%, #111827 50%, #0d1117 100%);
    }
    .login-card {
      background: #161b2e; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
      padding: 48px; width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-card h1 {
      font-size: 28px; font-weight: 800; margin-bottom: 4px;
      background: linear-gradient(135deg, #4ade80, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-card p { color: #62b3e0; font-size: 13px; margin-bottom: 32px; }
    .login-card label { display: block; font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .login-card input {
      width: 100%; padding: 12px 16px; background: #0f1420; border: 1px solid #2d3548;
      border-radius: 10px; color: #e0e0e0; font-size: 14px; margin-bottom: 20px; outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: #60a5fa; }
    .btn-login {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none; border-radius: 10px; color: #000; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .login-error { color: #f87171; font-size: 13px; margin-bottom: 16px; text-align: center; }

    /* Layout */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 240px; background: #111827; border-right: 1px solid rgba(255,255,255,0.06);
      padding: 20px 0; display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-logo h2 {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, #4ade80, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-logo span { font-size: 10px; color: #62b3e0; text-transform: uppercase; letter-spacing: 1.5px; }
    .sidebar-nav { padding: 12px 8px; flex: 1; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin: 2px 0;
      border-radius: 10px; cursor: pointer; font-size: 13px; color: #9ca3af;
      transition: all 0.2s; text-decoration: none;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: #e0e0e0; }
    .sidebar-item.active { background: rgba(96,165,250,0.1); color: #60a5fa; font-weight: 600; }
    .sidebar-item svg { width: 20px; height: 20px; }
    .sidebar-footer {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; color: #4a9fd4;
    }
    .sidebar-footer .logout { color: #f87171; cursor: pointer; font-size: 12px; }
    .sidebar-footer .logout:hover { text-decoration: underline; }

    /* Main content */
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .page-title { font-size: 28px; font-weight: 700; color: #f3f4f6; margin-bottom: 4px; }
    .page-subtitle { font-size: 14px; color: #4ade80; margin-bottom: 24px; }
    .divider { height: 1px; background: #4ade80; opacity: 0.3; margin-bottom: 28px; }

    /* Cards */
    .card {
      background: #161b2e; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }
    .card-title { font-size: 16px; font-weight: 600; color: #f3f4f6; margin-bottom: 16px; }

    /* Info blocks */
    .info-row { display: flex; gap: 32px; flex-wrap: wrap; }
    .info-block label { display: block; font-size: 11px; color: #62b3e0; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-block .value { font-size: 18px; font-weight: 700; color: #4ade80; }
    .info-block .value.blue { color: #60a5fa; }
    .hash-text { font-family: monospace; font-size: 12px; color: #9ca3af; word-break: break-all; max-width: 500px; }
    .copy-btn {
      background: none; border: none; color: #62b3e0; cursor: pointer; font-size: 12px;
      padding: 2px 6px; border-radius: 4px;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.05); color: #e0e0e0; }

    /* Form elements */
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; color: #62b3e0; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      padding: 10px 14px; background: #0f1420; border: 1px solid #2d3548;
      border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none;
    }
    .form-group input:focus { border-color: #60a5fa; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex;
      align-items: center; gap: 8px;
    }
    .btn-primary { background: #22c55e; color: #000; }
    .btn-primary:hover { background: #4ade80; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-blue:hover { background: #60a5fa; }
    .btn-red { background: #dc2626; color: #fff; }
    .btn-red:hover { background: #ef4444; }
    .btn-outline {
      background: transparent; color: #60a5fa; border: 1px solid #3b82f6;
    }
    .btn-outline:hover { background: rgba(59,130,246,0.1); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .file-btn { position: relative; overflow: hidden; }
    .file-btn input[type="file"] {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }

    /* Alert */
    .alert {
      padding: 12px 16px; border-radius: 8px; margin-top: 16px; font-size: 13px;
    }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }
    .alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; color: #62b3e0; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #d1d5db; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .chip {
      display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px;
      font-weight: 600; background: rgba(34,197,94,0.15); color: #4ade80;
    }
    .chip.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .chip.orange { background: rgba(251,146,60,0.15); color: #fb923c; }
    .chip.red { background: rgba(239,68,68,0.15); color: #f87171; }
    .chip.gray { background: rgba(156,163,175,0.15); color: #9ca3af; }
    .mono { font-family: monospace; font-size: 12px; color: #9ca3af; }

    /* Progress bar */
    .progress-container {
      width: 100%; background: #0f1420; border-radius: 6px; height: 8px; overflow: hidden;
      margin-top: 4px;
    }
    .progress-bar {
      height: 100%; border-radius: 6px; transition: width 0.3s ease;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
    }
    .progress-bar.complete {
      background: linear-gradient(90deg, #22c55e, #4ade80);
    }
    .progress-bar.error {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }
    .progress-text {
      font-size: 11px; color: #62b3e0; margin-top: 2px;
    }

    /* OTA meter card */
    .ota-meter-card {
      background: #0f1420; border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px; padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px;
    }
    .ota-meter-drn {
      font-family: monospace; font-size: 14px; font-weight: 600; color: #e0e0e0;
      min-width: 140px;
    }
    .ota-meter-info { flex: 1; }
    .ota-meter-status { min-width: 100px; text-align: right; }

    /* Status dot */
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
    }
    .status-dot.green { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.4); }
    .status-dot.blue { background: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.4); animation: pulse 1.5s infinite; }
    .status-dot.red { background: #f87171; }
    .status-dot.gray { background: #62b3e0; }
    .status-dot.orange { background: #fb923c; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .refresh-btn { background: none; border: none; color: #62b3e0; cursor: pointer; padding: 4px; border-radius: 6px; }
    .refresh-btn:hover { background: rgba(255,255,255,0.05); color: #e0e0e0; }

    .description { font-size: 13px; color: #62b3e0; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const state = {
      token: sessionStorage.getItem('ota_token'),
      user: JSON.parse(sessionStorage.getItem('ota_user') || 'null'),
      firmware: null,
      versions: [],
      meters: [],
      otaState: {},
      meterFirmwareVersions: {},
      nextion: null,
      nextionVersions: [],
      nextionOtaState: {},
    };

    let eventSource = null;

    // ─── API helpers ───
    async function api(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
      if (!(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';

      const res = await fetch(url, { ...options, headers });
      if (res.status === 401) { logout(); throw new Error('Session expired'); }
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function logout() {
      sessionStorage.removeItem('ota_token');
      sessionStorage.removeItem('ota_user');
      state.token = null;
      state.user = null;
      if (eventSource) { eventSource.close(); eventSource = null; }
      render();
    }

    // ─── SSE for real-time OTA updates ───
    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource(`/api/ota/events?token=${state.token}`);

      // Auth via query param won't work with our middleware, so use a polling fallback
      // Actually, the SSE endpoint uses auth middleware which reads Authorization header.
      // EventSource doesn't support headers, so we'll use fetch-based SSE or polling.
      eventSource.close();
      eventSource = null;
      startPolling();
    }

    let pollInterval = null;
    function startPolling() {
      if (pollInterval) return;
      pollInterval = setInterval(async () => {
        try {
          const data = await api('/api/ota/status');
          let changed = false;

          // Update OTA state
          for (const drn in data.otaState) {
            const prev = state.otaState[drn];
            const curr = data.otaState[drn];
            if (!prev || prev.status !== curr.status || prev.progress !== curr.progress) {
              changed = true;
            }
            state.otaState[drn] = curr;
          }

          // Update firmware versions
          for (const drn in data.meterFirmwareVersions) {
            state.meterFirmwareVersions[drn] = data.meterFirmwareVersions[drn];
          }

          // Update Nextion OTA state
          if (data.nextionOtaState) {
            for (const drn in data.nextionOtaState) {
              const prev = state.nextionOtaState[drn];
              const curr = data.nextionOtaState[drn];
              if (!prev || prev.status !== curr.status || prev.progress !== curr.progress) {
                changed = true;
              }
              state.nextionOtaState[drn] = curr;
            }
          }

          if (changed) {
            // Update meters' ota_status
            state.meters.forEach(m => {
              if (state.otaState[m.drn]) {
                m.ota_status = state.otaState[m.drn];
              }
            });
            renderPage();
          }
        } catch {}
      }, 2000);
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    // ─── Render ───
    function render() {
      const app = $('#app');
      if (!state.token) {
        stopPolling();
        app.innerHTML = renderLogin();
        bindLogin();
      } else {
        app.innerHTML = renderApp();
        bindApp();
        loadData();
        startPolling();
      }
    }

    // ─── Login page ───
    function renderLogin() {
      return `
        <div class="login-container">
          <div class="login-card">
            <h1>GRIDx</h1>
            <p>Firmware OTA Portal</p>
            <div id="login-error" class="login-error" style="display:none"></div>
            <label>Username</label>
            <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password">
            <button class="btn-login" id="login-btn">Sign In</button>
          </div>
        </div>
      `;
    }

    function bindLogin() {
      const btn = $('#login-btn');
      const doLogin = async () => {
        const username = $('#login-user').value;
        const password = $('#login-pass').value;
        if (!username || !password) return;
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        try {
          const data = await api('/api/login', {
            method: 'POST',
            body: JSON.stringify({ username, password }),
          });
          state.token = data.token;
          state.user = data.user;
          sessionStorage.setItem('ota_token', data.token);
          sessionStorage.setItem('ota_user', JSON.stringify(data.user));
          render();
        } catch (err) {
          const errEl = $('#login-error');
          errEl.style.display = 'block';
          errEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      };
      btn.onclick = doLogin;
      $('#login-pass').onkeydown = (e) => { if (e.key === 'Enter') doLogin(); };
    }

    // ─── Main app ───
    function renderApp() {
      return `
        <div class="app">
          <div class="sidebar">
            <div class="sidebar-logo">
              <h2>GRIDx</h2>
              <span>OTA Portal</span>
            </div>
            <div class="sidebar-nav">
              <div class="sidebar-item active" data-page="firmware">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Firmware Upload
              </div>
              <div class="sidebar-item" data-page="push">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                Push OTA
              </div>
              <div class="sidebar-item" data-page="nextion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
                Nextion Display
              </div>
              <div class="sidebar-item" data-page="meters">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Meters
              </div>
              <div class="sidebar-item" data-page="management">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15 1.65 1.65 0 003 14.08V14a2 2 0 014 0v.09a1.65 1.65 0 001 1.51zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Meter Config
              </div>
            </div>
            <div class="sidebar-footer">
              <div style="margin-bottom:8px">Logged in as <strong>${state.user?.username || ''}</strong></div>
              <span class="logout" id="logout-btn">Sign Out</span>
            </div>
          </div>
          <div class="main" id="main-content"></div>
        </div>
      `;
    }

    let currentPage = 'firmware';

    function bindApp() {
      $('#logout-btn').onclick = logout;
      $$('.sidebar-item').forEach(item => {
        item.onclick = () => {
          $$('.sidebar-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          currentPage = item.dataset.page;
          renderPage();
        };
      });
      renderPage();
    }

    async function loadData() {
      try {
        const [fw, vers, meters, otaStatus, nxInfo, nxVers] = await Promise.all([
          api('/api/firmware/info').catch(() => null),
          api('/api/firmware/versions').catch(() => ({ versions: [] })),
          api('/api/meters').catch(() => ({ meters: [] })),
          api('/api/ota/status').catch(() => ({ otaState: {}, meterFirmwareVersions: {}, nextionOtaState: {} })),
          api('/api/nextion/info').catch(() => null),
          api('/api/nextion/versions').catch(() => ({ versions: [] })),
        ]);
        state.firmware = fw;
        state.versions = vers.versions || [];
        state.meters = meters.meters || [];
        state.otaState = otaStatus.otaState || {};
        state.meterFirmwareVersions = otaStatus.meterFirmwareVersions || {};
        state.nextion = nxInfo;
        state.nextionVersions = nxVers.versions || [];
        state.nextionOtaState = otaStatus.nextionOtaState || {};
        renderPage();
      } catch {}
    }

    function renderPage() {
      const main = $('#main-content');
      if (!main) return;
      switch (currentPage) {
        case 'firmware': main.innerHTML = renderFirmwarePage(); bindFirmwarePage(); break;
        case 'push': main.innerHTML = renderPushPage(); bindPushPage(); break;
        case 'nextion': main.innerHTML = renderNextionPage(); bindNextionPage(); break;
        case 'meters': main.innerHTML = renderMetersPage(); break;
        case 'management': main.innerHTML = renderManagementPage(); bindManagementPage(); break;
      }
    }

    // ─── Helper: get firmware status for a meter ───
    function getMeterFwStatus(meter) {
      const latestFw = state.firmware;
      const meterFw = meter.firmware_version || state.meterFirmwareVersions[meter.drn]?.version || null;
      const otaStatus = meter.ota_status || state.otaState[meter.drn] || { status: 'idle', progress: 0 };

      if (otaStatus.status === 'updating') {
        return { label: 'Updating', chipClass: 'orange', dotClass: 'orange', progress: otaStatus.progress, detail: otaStatus.detail };
      }
      if (otaStatus.status === 'complete') {
        return { label: 'Up to date', chipClass: '', dotClass: 'green', progress: 100, detail: otaStatus.detail };
      }
      if (otaStatus.status === 'error') {
        return { label: 'Error', chipClass: 'red', dotClass: 'red', progress: 0, detail: otaStatus.detail };
      }

      if (!meterFw) {
        return { label: 'Not updated', chipClass: 'gray', dotClass: 'gray', progress: null, detail: 'No update recorded' };
      }
      if (latestFw && meterFw === latestFw.version) {
        return { label: 'Up to date', chipClass: '', dotClass: 'green', progress: null, detail: '' };
      }
      return { label: 'Outdated', chipClass: 'orange', dotClass: 'orange', progress: null, detail: `Running v${meterFw}` };
    }

    function formatDate(d) {
      if (!d) return '-';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return '-';
      return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' ' + dt.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    // ─── Firmware Upload Page ───
    function renderFirmwarePage() {
      const fw = state.firmware;
      return `
        <div class="page-title">Firmware Upload</div>
        <div class="page-subtitle">Upload firmware and auto-generate hydro hash</div>
        <div class="divider"></div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="card-title">Current Firmware</div>
            <button class="refresh-btn" onclick="loadData()">&#x21bb;</button>
          </div>
          ${fw && fw.available !== false ? `
            <div class="info-row">
              <div class="info-block"><label>Version</label><div class="value">v${fw.version}</div></div>
              <div class="info-block"><label>Size</label><div class="value blue">${(fw.size/1024).toFixed(1)} KB</div></div>
              <div class="info-block"><label>GRIDx Signature</label><div class="value" style="font-size:14px">${fw.mfr ? '<span style="color:#4ade80">Verified (MFR ' + fw.mfr + ')</span>' : '<span style="color:#fb923c">Not verified</span>'}</div></div>
              <div class="info-block">
                <label>Hydro Hash (Gimli)</label>
                <div class="hash-text">${fw.hash} <button class="copy-btn" onclick="navigator.clipboard.writeText('${fw.hash}')">Copy</button></div>
              </div>
            </div>

        return { label: 'Updating', chipClass: 'orange', dotClass: 'orange', progress: nxState.progress, detail: nxState.detail };

      if (nxState.status === 'complete') {

        const st = getMeterFwStatus(m);
        if (st.label === 'Up to date') updatedCount++;
        else if (st.label === 'Updating') updatingCount++;
        else if (st.label === 'Error') errorCount++;
      });
      const outdatedCount = state.meters.length - updatedCount - updatingCount - errorCount;

      return `
        <div class="page-title">Meters</div>
        <div class="page-subtitle">All meters in the database with firmware status</div>
        <div class="divider"></div>

        <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">

          <div class="card" style="flex:1;min-width:160px;margin-bottom:0">

            <div style="font-size:28px;font-weight:700;color:#4ade80">${updatedCount}</div>
          </div>
          <div class="card" style="flex:1;min-width:160px;margin-bottom:0">
            <div style="font-size:11px;color:#62b3e0;text-transform:uppercase;letter-spacing:0.5px">Currently Updating</div>
            <div style="font-size:28px;font-weight:700;color:#60a5fa">${updatingCount}</div>
          </div>
          <div class="card" style="flex:1;min-width:160px;margin-bottom:0">
            <div style="font-size:11px;color:#62b3e0;text-transform:uppercase;letter-spacing:0.5px">Outdated / Not Updated</div>
            <div style="font-size:28px;font-weight:700;color:#fb923c">${outdatedCount}</div>
          </div>
        </div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <div class="card-title" style="margin-bottom:0">${state.meters.length} Meter${state.meters.length !== 1 ? 's' : ''} Registered</div>
            <button class="refresh-btn" onclick="loadData()">&#x21bb;</button>
          </div>
          ${state.meters.length === 0 ? '<div style="color:#62b3e0">No meters found in database</div>' : `
            <table>
              <thead><tr><th>DRN</th><th>Customer</th><th>City</th><th>Firmware</th><th>Status</th><th>Progress</th><th>Last Updated</th></tr></thead>
              <tbody>
                ${state.meters.map(m => {
                  const st = getMeterFwStatus(m);
                  const meterFw = m.firmware_version || state.meterFirmwareVersions[m.drn]?.version || '-';
                  const lastUpdated = m.completed_at;
                  return `
                    <tr>
                      <td class="mono">${m.drn}</td>
                      <td>${m.customer || '-'}</td>
                      <td>${m.city || '-'}</td>
                      <td>
                        <span class="chip ${meterFw === (state.firmware?.version || '') ? '' : (meterFw === '-' ? 'gray' : 'orange')}">
                          ${meterFw === '-' ? 'Not updated' : 'v' + meterFw}
                        </span>
                      </td>
                      <td>
                        <span class="status-dot ${st.dotClass}"></span>
                        ${st.label}

                          </div>
                          <div class="progress-text">${st.progress}%</div>
                        ` : '-'}
                      </td>
                      <td style="font-size:12px;color:#9ca3af;min-width:140px">
                        ${formatDate(lastUpdated)}
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }

    // ─── Meter Management Page ───
    let mgmtDrn = '';
    let mgmtAcks = {};
    let ackPollInterval = null;

    function startAckPolling() {
      stopAckPolling();
      if (!mgmtDrn) return;
      ackPollInterval = setInterval(async () => {
        try {
          const data = await api(`/api/cmd/acks/${mgmtDrn}`);
          mgmtAcks = data.acks || {};
          const el = document.getElementById('ack-log');
          if (el) el.innerHTML = renderAckLog();
        } catch {}
      }, 2000);
    }

    function stopAckPolling() {
      if (ackPollInterval) { clearInterval(ackPollInterval); ackPollInterval = null; }
    }

    function renderAckLog() {
      const keys = Object.keys(mgmtAcks);
      if (keys.length === 0) return '<div style="color:#62b3e0;font-size:12px">No responses yet</div>';
      return keys.slice(-10).reverse().map(k => {
        const a = mgmtAcks[k];
        const time = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : '';
        return `<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px">
          <span style="color:#4ade80">${time}</span> <span class="mono" style="color:#9ca3af">${k.replace(mgmtDrn+'_','')}</span>: <span style="color:#e0e0e0">${JSON.stringify(a.payload||a)}</span>
        </div>`;
      }).join('');
    }

    async function sendCmd(endpoint, body, resultId) {
      const el = document.getElementById(resultId);
      if (el) el.innerHTML = '<span class="spinner"></span>';
      try {
        const data = await api(`/api/cmd/${endpoint}`, { method: 'POST', body: JSON.stringify({ drn: mgmtDrn, ...body }) });
        if (el) el.innerHTML = `<div class="alert alert-success" style="margin-top:8px;padding:8px 12px">Sent: ${JSON.stringify(data.command)}</div>`;
      } catch (err) {
        if (el) el.innerHTML = `<div class="alert alert-error" style="margin-top:8px;padding:8px 12px">${err.message}</div>`;
      }
    }

    function bindManagementPage() {
      const drnSel = document.getElementById('mgmt-drn');
      if (drnSel) {
        drnSel.onchange = () => {
          mgmtDrn = drnSel.value;
          mgmtAcks = {};
          const panels = document.getElementById('mgmt-panels');
          if (panels) panels.style = mgmtDrn ? '' : 'opacity:0.4;pointer-events:none';
          if (mgmtDrn) startAckPolling(); else stopAckPolling();
        };
      }

      // Relay control
      document.querySelectorAll('.relay-btn').forEach(btn => {
        btn.onclick = () => sendCmd('relay-control', { relay: btn.dataset.relay, action: btn.dataset.action }, 'relay-result');
      });

      // Geyser mode
      const geyserModeBtn = document.getElementById('geyser-mode-btn');
      if (geyserModeBtn) geyserModeBtn.onclick = () => sendCmd('geyser-mode', { mode: document.getElementById('geyser-mode-sel').value }, 'geyser-result');

      // Geyser timer
      const timerStart = document.getElementById('geyser-timer-start');
      const timerStop = document.getElementById('geyser-timer-stop');
      if (timerStart) timerStart.onclick = () => sendCmd('geyser-timer', { action: 'start', hours: parseInt(document.getElementById('geyser-hrs').value)||0, minutes: parseInt(document.getElementById('geyser-mins').value)||0 }, 'geyser-result');
      if (timerStop) timerStop.onclick = () => sendCmd('geyser-timer', { action: 'stop' }, 'geyser-result');

      // Geyser schedule
      const schedBtn = document.getElementById('geyser-sched-btn');
      if (schedBtn) schedBtn.onclick = () => {
        const raw = document.getElementById('geyser-sched').value.trim();
        const schedules = raw.split(',').map(s => { const [start, end] = s.trim().split('-'); return { start, end }; });
        sendCmd('geyser-schedule', { schedules }, 'geyser-result');
      };

      // STS Token
      const stsBtn = document.getElementById('sts-send-btn');
      if (stsBtn) stsBtn.onclick = () => {
        const token = document.getElementById('sts-token').value.trim();
        if (!/^\d{20}$/.test(token)) { document.getElementById('sts-result').innerHTML = '<div class="alert alert-error" style="margin-top:8px;padding:8px 12px">Token must be exactly 20 digits</div>'; return; }
        sendCmd('token', { token }, 'sts-result');
      };

      // Calibration
      const calAuto = document.getElementById('cal-auto-btn');
      const calVerify = document.getElementById('cal-verify-btn');
      if (calAuto) calAuto.onclick = () => sendCmd('calibrate', { action: 'auto' }, 'cal-result');
      if (calVerify) calVerify.onclick = () => sendCmd('calibrate', { action: 'verify' }, 'cal-result');

      // Net Metering
      const nmBtn = document.getElementById('nm-send-btn');
      if (nmBtn) nmBtn.onclick = () => {
        const mode = document.getElementById('nm-mode').value;
        const feed_in_rate = parseFloat(document.getElementById('nm-rate').value) || undefined;
        sendCmd('net-metering-mode', { mode, feed_in_rate }, 'nm-result');
      };

      // Billing Mode
      const billPre = document.getElementById('bill-prepaid-btn');
      const billPost = document.getElementById('bill-postpaid-btn');
      if (billPre) billPre.onclick = () => sendCmd('billing-mode', { mode: 'prepaid' }, 'bill-result');
      if (billPost) billPost.onclick = () => sendCmd('billing-mode', { mode: 'postpaid' }, 'bill-result');

      // TOU Mode
      const touBtn = document.getElementById('tou-send-btn');
      if (touBtn) touBtn.onclick = () => sendCmd('tou-mode', { mode: parseInt(document.getElementById('tou-mode-sel').value) }, 'tou-result');

      // Device management
      document.querySelectorAll('.device-btn').forEach(btn => {
        btn.onclick = () => sendCmd('device', { action: btn.dataset.action }, 'device-result');
      });

      // Auth numbers
      const authAdd = document.getElementById('auth-add-btn');
      const authRemove = document.getElementById('auth-remove-btn');
      const authList = document.getElementById('auth-list-btn');
      if (authAdd) authAdd.onclick = () => { const n = document.getElementById('auth-number').value.trim(); if(!n){return;} sendCmd('auth-numbers', { action: 'add', number: n }, 'auth-result'); };
      if (authRemove) authRemove.onclick = () => { const n = document.getElementById('auth-number').value.trim(); if(!n){return;} sendCmd('auth-numbers', { action: 'remove', number: n }, 'auth-result'); };
      if (authList) authList.onclick = () => sendCmd('auth-numbers', { action: 'list' }, 'auth-result');

      // Commissioning
      document.querySelectorAll('.comm-btn').forEach(btn => {
        btn.onclick = () => sendCmd('commissioning', { action: btn.dataset.action }, 'comm-result');
      });

      // Energy test
      const etestStart = document.getElementById('etest-start-btn');
      const etestStatus = document.getElementById('etest-status-btn');
      if (etestStart) etestStart.onclick = () => sendCmd('energy-test', { action: 'start', duration_s: parseInt(document.getElementById('etest-duration').value)||60 }, 'comm-result');
      if (etestStatus) etestStatus.onclick = () => sendCmd('energy-test', { action: 'status' }, 'comm-result');

      // Raw command
      const rawBtn = document.getElementById('raw-send-btn');
      if (rawBtn) rawBtn.onclick = async () => {
        const input = document.getElementById('raw-cmd').value.trim();
        try {
          const payload = JSON.parse(input);
          const el = document.getElementById('raw-result');
          el.innerHTML = '<span class="spinner"></span>';
          const data = await api('/api/cmd/send', { method: 'POST', body: JSON.stringify({ drn: mgmtDrn, payload }) });
          el.innerHTML = `<div class="alert alert-success" style="margin-top:8px;padding:8px 12px">Published to ${data.topic}</div>`;
        } catch (err) {
          document.getElementById('raw-result').innerHTML = `<div class="alert alert-error" style="margin-top:8px;padding:8px 12px">${err.message || 'Invalid JSON'}</div>`;
        }
      };

      if (mgmtDrn) startAckPolling();
    }

    // ─── Init ───
    render();
  </script>
</body>
</html>
